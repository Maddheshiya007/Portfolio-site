<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chandan Maddheshiya - Web Developer </title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">


    <div class="sidebar">

      <nav>
        <ul>
          <li><a href="/"> Home</a></li>
          <li><a href="/intro.html"> My Intro</a></li>
          <li><a href="/services.html"> Services</a></li>
          <li><a href="/blog.html"> Blog</a></li>
          <li><a href="/contact.html">Contact Me</a></li>
        </ul>
      </nav>
    </div>
    <div class="main">
      <div class="contactform">
        <h1>Contact me for work/general Enquiries</h1>
        <form action="post">
          <div class="mb-3">
            <label for="clientname" class="form-label">Name</label>
            <input type="text" class="clientname">
          </div>
          <div class="mb-3">
            <label for="clientfathername" class="form-label">Father's Name</label>
            <input type="text" class="clientfathername">
          </div>
          <div class="mb-3">

            <label for="clientemail" class="form-label">Email address</label>
            <input type="email" class="form-control" id="clientemail" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text">We'll never share your email & and phone numbernwith anyone else.
            </div>
          </div>
          <div class="mb-3">
            <label for="countrycode" class="form-label">Country</label>
            <select name="countryname" id="Country">
              <option value="India">India</option>
              <option value="America">America</option>
              <option value="China">China</option>
              <option value="Nepal">Nepal</option>
              <option value="Sri Lanka"></option>
            </select>
          </div>
          <div class="mb-3">
            <label for="clientphone" class="form-label">Mobile NO.</label>
            <input type="phone" class="form-control" id="clientphone">
          </div>
          <div class="mb-3">
            <label for="clientquery">Enquiry:</label>
            <br>
            <textarea name="" id="" cols="60" rows="3"></textarea>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="isclient">
              <label class="form-check-label" for="isclient">I want you to work on a project with me</label>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
